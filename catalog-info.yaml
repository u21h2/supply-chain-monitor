# Declare your Buildkite pipelines below
---
# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: buildkite-pipeline-supply-chain-monitor
  description: Buildkite Pipeline for supply-chain-monitor
  links:
    - title: Pipeline
      url: https://buildkite.com/elastic/supply-chain-monitor

spec:
  type: buildkite-pipeline
  owner: group:protections-leads
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: supply-chain-monitor
      description: 
    spec:
      repository: elastic/supply-chain-monitor
      pipeline_file: ".buildkite/pipeline.yml"
      provider_settings:
        build_pull_request_forks: true
      teams:
        trade-admins:
          access_level: MANAGE_BUILD_AND_READ
        everyone:
          access_level: READ_ONLY
